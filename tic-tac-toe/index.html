<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Tic-Tac-Toe | Premium Edition</title>
    <meta name="description" content="A premium, high-performance Tic-Tac-Toe game with a stunning modern design.">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <main class="game-container">
        <header class="header">
            <h1 class="title">Tic Tac Toe</h1>
            <p class="subtitle">Premium Edition</p>
        </header>

        <section class="game-info">
            <div class="status" id="status">Player <span class="current-player" id="player-indicator">X</span>'s Turn</div>
        </section>

        <div class="grid" id="grid">
            <div class="cell" data-index="0" id="cell-0"></div>
            <div class="cell" data-index="1" id="cell-1"></div>
            <div class="cell" data-index="2" id="cell-2"></div>
            <div class="cell" data-index="3" id="cell-3"></div>
            <div class="cell" data-index="4" id="cell-4"></div>
            <div class="cell" data-index="5" id="cell-5"></div>
            <div class="cell" data-index="6" id="cell-6"></div>
            <div class="cell" data-index="7" id="cell-7"></div>
            <div class="cell" data-index="8" id="cell-8"></div>
        </div>

        <footer class="controls">
            <button class="reset-btn" id="reset-btn">Reset Game</button>
        </footer>
    </main>

    <!-- Placeholder for your JS logic -->
    <!-- <script src="script.js"></script> -->
</body>
</html>
